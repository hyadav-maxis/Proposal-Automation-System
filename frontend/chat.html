<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - Proposal Automation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f5f6fa;
            --surface: #ffffff;
            --surface2: #f8f9fc;
            --border: #e8eaf0;
            --accent: #6366f1;
            --accent2: #4f46e5;
            --accent-glow: rgba(99, 102, 241, 0.13);
            --green: #16a34a;
            --green-bg: #dcfce7;
            --red: #dc2626;
            --red-bg: #fee2e2;
            --text: #1e2433;
            --text-secondary: #4b5563;
            --text-muted: #9ca3af;
            --radius: 14px;
            --radius-sm: 10px;
            --shadow-sm: 0 1px 4px rgba(0, 0, 0, 0.06), 0 2px 12px rgba(0, 0, 0, 0.04);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.07), 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            font-size: 15px;
        }

        .topbar {
            background: var(--surface);
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }

        .topbar-brand {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 9px;
        }

        .topbar-nav {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .topbar-nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 7px 14px;
            border-radius: 8px;
            transition: all 0.18s;
            position: relative;
        }

        .topbar-nav a:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .topbar-nav a.active {
            color: var(--accent);
            font-weight: 600;
        }

        .topbar-nav a.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 14px;
            right: 14px;
            height: 2px;
            background: var(--accent);
            border-radius: 2px 2px 0 0;
        }

        .page {
            max-width: 900px;
            margin: 0 auto;
            padding: 36px 24px 80px;
        }

        .page-header {
            margin-bottom: 24px;
        }

        .page-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .chat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            min-height: 65vh;
        }

        .status-bar {
            padding: 10px 18px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            border-radius: var(--radius) var(--radius) 0 0;
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-muted);
            flex-shrink: 0;
            transition: background 0.3s;
        }

        .status-dot.online {
            background: var(--green);
        }

        #chatLog {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--surface);
            min-height: 350px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 82%;
            padding: 12px 16px;
            border-radius: 14px;
            line-height: 1.55;
            font-size: 0.9rem;
        }

        .msg.user {
            background: var(--accent);
            color: #fff;
            margin-left: auto;
            border-radius: 14px 14px 4px 14px;
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        .msg.assistant {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 14px 14px 14px 4px;
            white-space: pre-wrap;
        }

        .msg .role {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.65;
            margin-bottom: 4px;
        }

        .input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            background: var(--surface);
            border-radius: 0 0 var(--radius) var(--radius);
        }

        #userInput {
            flex: 1;
            padding: 11px 15px;
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #userInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        #userInput::placeholder {
            color: var(--text-muted);
        }

        #sendBtn {
            padding: 11px 22px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.18s, transform 0.18s;
            white-space: nowrap;
            box-shadow: 0 2px 8px var(--accent-glow);
        }

        #sendBtn:hover {
            background: var(--accent2);
            transform: translateY(-1px);
        }

        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .create-proposal-btn {
            margin-top: 10px;
            padding: 9px 18px;
            background: var(--green);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            font-size: 0.875rem;
            transition: background 0.18s;
            box-shadow: 0 2px 8px rgba(22, 163, 74, 0.25);
        }

        .create-proposal-btn:hover {
            background: #15803d;
        }

        .download-btns {
            margin-top: 12px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .download-btns a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.18s;
        }

        .download-btns a.pdf {
            background: var(--red-bg);
            color: var(--red);
            border: 1.5px solid rgba(220, 38, 38, 0.25);
        }

        .download-btns a.pdf:hover {
            background: var(--red);
            color: #fff;
        }

        .download-btns a.excel {
            background: var(--green-bg);
            color: var(--green);
            border: 1.5px solid rgba(22, 163, 74, 0.25);
        }

        .download-btns a.excel:hover {
            background: var(--green);
            color: #fff;
        }
    </style>
</head>

<body>
    <header class="topbar">
        <a href="/" class="topbar-brand">
            <div
                style="width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;">
                🚀</div>
            Proposal Automation System
        </a>
        <nav class="topbar-nav">
            <a href="/">New Proposal</a>
            <a href="/pricing-config">⚙️ Pricing</a>
            <a href="/chat" class="active">🤖 AI Assistant</a>
            <a href="/settings">⚙️ Settings</a>
            <a href="/proposals">📋 All Proposals</a>
        </nav>
    </header>
    <main class="page">
        <div class="page-header">
            <h1>🤖 AI Proposal Assistant</h1>
            <p>Chat with the AI Assistant to create and configure proposals automatically.</p>
        </div>
        <div class="chat-card">
            <div class="status-bar">
                <div class="status-dot" id="statusDot"></div>
                <span id="status">Checking AI agent…</span>
            </div>
            <div id="chatLog"></div>
            <div class="input-area">
                <input type="text" id="userInput"
                    placeholder="e.g. Create a proposal for ABC Corp, 50GB database, 5 runs, client premises…" />
                <button id="sendBtn">Send</button>
            </div>
        </div>
    </main>
    <script>
        const API_URL = window.location.origin || 'http://localhost:8003';
        let messages = [];

        async function checkStatus() {
            try {
                const r = await fetch(API_URL + '/api/chat/status');
                const d = await r.json();
                document.getElementById('status').textContent = d.available ? 'AI agent is ready. Ask to create a proposal or ask about pricing.' : 'AI agent is offline. Set OPENAI_API_KEY in .env to enable.'; document.getElementById('statusDot').className = d.available ? 'status-dot online' : 'status-dot';
                return d.available;
            } catch (e) {
                document.getElementById('status').textContent = 'Could not reach server.'; document.getElementById('statusDot').className = 'status-dot';
                return false;
            }
        }

        function appendMsg(role, content, proposalData = null) {
            const log = document.getElementById('chatLog');
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            div.innerHTML = '<div class="role">' + role + '</div>' + content.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
            if (proposalData && role === 'assistant') {
                const btn = document.createElement('button');
                btn.className = 'create-proposal-btn';
                btn.textContent = 'Create this proposal';
                btn.onclick = () => createProposalFromChat(proposalData);
                div.appendChild(document.createElement('br'));
                div.appendChild(btn);
            }
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        function appendProposalCreatedMsg(proposalNumber, totalPrice, proposalId) {
            const log = document.getElementById('chatLog');
            const div = document.createElement('div');
            div.className = 'msg assistant';
            div.innerHTML = '<div class="role">assistant</div>Proposal created: <strong>' + proposalNumber + '</strong>. Total: <strong>$' + parseFloat(totalPrice).toFixed(2) + '</strong>.';
            const btnWrap = document.createElement('div');
            btnWrap.className = 'download-btns';
            const pdfLink = document.createElement('a');
            pdfLink.href = API_URL + '/api/export/proposal/' + proposalId + '/pdf';
            pdfLink.className = 'pdf';
            pdfLink.textContent = 'Download PDF';
            pdfLink.setAttribute('download', 'proposal_' + proposalNumber + '.pdf');
            pdfLink.target = '_blank';
            const excelLink = document.createElement('a');
            excelLink.href = API_URL + '/api/export/proposal/' + proposalId + '/excel';
            excelLink.className = 'excel';
            excelLink.textContent = 'Download Excel';
            excelLink.setAttribute('download', 'proposal_' + proposalNumber + '.xlsx');
            excelLink.target = '_blank';
            btnWrap.appendChild(pdfLink);
            btnWrap.appendChild(excelLink);
            div.appendChild(btnWrap);
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        async function createProposalFromChat(data) {
            const client_email = data.client_email || null;
            let birtDist = data.birt_complexity_distribution || null;
            if (birtDist && typeof birtDist === 'object') {
                const converted = {};
                for (const [k, v] of Object.entries(birtDist)) {
                    converted[parseInt(k, 10)] = parseInt(v, 10);
                }
                birtDist = converted;
            }
            const payload = {
                client_name: data.client_name,
                client_email: client_email,
                project_name: data.project_name || 'Project',
                database_size_gb: parseFloat(data.database_size_gb) || 10,
                number_of_runs: parseInt(data.number_of_runs, 10) || 1,
                deployment_type: data.deployment_type || 'client_premises',
                has_where_clauses: !!data.has_where_clauses,
                has_birt_reports: birtDist && Object.keys(birtDist).length > 0,
                num_birt_reports: birtDist ? Object.values(birtDist).reduce((a, b) => a + b, 0) : 0,
                birt_complexity_distribution: birtDist && Object.keys(birtDist).length > 0 ? birtDist : null,
                has_maximo_upgrade: !!data.has_maximo_upgrade,
                maximo_has_addon: !!data.maximo_has_addon
            };
            try {
                const r = await fetch(API_URL + '/api/proposals/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                    credentials: 'omit'
                });
                if (!r.ok) {
                    const err = await r.json();
                    throw new Error(err.detail || 'Failed');
                }
                const result = await r.json();
                appendProposalCreatedMsg(result.proposal_number, result.total_price, result.proposal_id);
            } catch (e) {
                appendMsg('assistant', 'Error: ' + e.message);
            }
        }

        async function send() {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            btn.disabled = true;
            messages.push({ role: 'user', content: text });
            appendMsg('user', text);
            try {
                const r = await fetch(API_URL + '/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: messages }),
                    credentials: 'omit'
                });
                const d = await r.json();
                const reply = d.reply || '';
                const proposalData = d.proposal_data || null;
                messages.push({ role: 'assistant', content: reply });
                appendMsg('assistant', reply, proposalData);
            } catch (e) {
                appendMsg('assistant', 'Error: ' + e.message);
            }
            btn.disabled = false;
        }

        document.getElementById('sendBtn').onclick = send;
        document.getElementById('userInput').onkeydown = (e) => { if (e.key === 'Enter') send(); };
        checkStatus().then(ok => { if (ok) appendMsg('assistant', 'Hi! I can help you create a proposal. Tell me client name, project, database size (GB), number of runs, deployment (inhouse_vm or client_premises), whether you have WHERE clauses or BIRT reports (with complexity counts), and whether you need the Maximo Upgrade Feature (and if so, whether an Add-on is present).'); });
    </script>
</body>

</html>
